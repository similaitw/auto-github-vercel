<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub & Vercel 雙擎部署神器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 自訂捲軸樣式 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .log-container { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

  <div class="max-w-6xl mx-auto p-4 md:p-8">
    
    <!-- 標題區 -->
    <header class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <div class="flex items-center gap-4">
        <div class="bg-slate-900 p-3 rounded-xl text-white shadow-lg flex gap-2 items-center">
          <i data-lucide="github" class="w-6 h-6"></i>
          <span class="font-bold text-slate-400">+</span>
          <i data-lucide="triangle" class="w-6 h-6 fill-current"></i> <!-- 用三角形替代 Vercel Logo -->
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900">GitHub & Vercel 雙擎部署神器</h1>
          <p class="text-slate-500 mt-1">支援靜態網頁與 Node.js 全端動態應用，一鍵雙雲端發布</p>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- 左側：設定區 -->
      <div class="lg:col-span-4 space-y-6">
        
        <!-- Step 1: 部署目標選擇 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <div class="flex items-center gap-2 mb-4">
            <div class="bg-indigo-100 text-indigo-700 w-6 h-6 flex items-center justify-center rounded-full text-sm font-bold">1</div>
            <h2 class="font-bold text-lg">部署架構</h2>
          </div>
          <select id="deployMode" onchange="toggleMode()" class="w-full border border-slate-300 rounded-lg px-3 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-medium bg-slate-50 cursor-pointer">
            <option value="gh-pages">純靜態網頁 (部署至 GitHub Pages)</option>
            <option value="vercel">全端動態應用 (備份至 GitHub + 部署至 Vercel)</option>
          </select>
        </div>

        <!-- Step 2: 授權設定 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-100 text-blue-700 w-6 h-6 flex items-center justify-center rounded-full text-sm font-bold">2</div>
            <h2 class="font-bold text-lg">授權金鑰設定</h2>
          </div>
          <div class="space-y-4">
            <!-- GitHub Token -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1">
                <i data-lucide="github" class="w-4 h-4"></i> GitHub Token (PAT)
              </label>
              <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxx" 
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
              <p class="text-xs text-slate-500 mt-1">需勾選 <code class="bg-slate-100 px-1 rounded text-slate-700">repo</code> 權限。<a href="https://github.com/settings/tokens/new" target="_blank" class="text-blue-600 hover:underline">取得金鑰</a></p>
            </div>
            
            <!-- Vercel Token (動態顯示) -->
            <div id="vercelTokenGroup" class="hidden pt-2 border-t border-slate-100">
              <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1">
                <i data-lucide="triangle" class="w-4 h-4 fill-current"></i> Vercel Access Token
              </label>
              <input type="password" id="vercelToken" placeholder="xxxxxxxxxxxxxxxxxxxxxxxx" 
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-black outline-none transition-all">
              <p class="text-xs text-slate-500 mt-1">用於動態編譯 API。<a href="https://vercel.com/account/tokens" target="_blank" class="text-blue-600 hover:underline">取得金鑰</a></p>
            </div>
          </div>
        </div>

        <!-- Step 3: 專案資訊 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <div class="flex items-center gap-2 mb-4">
            <div class="bg-blue-100 text-blue-700 w-6 h-6 flex items-center justify-center rounded-full text-sm font-bold">3</div>
            <h2 class="font-bold text-lg">專案名稱</h2>
          </div>
          <input type="text" id="repoName" placeholder="my-awesome-app" 
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
          <p class="text-xs text-slate-500 mt-2">限英數字與連字號。若不存在系統將自動建立。</p>
        </div>

        <!-- 執行按鈕 -->
        <button id="deployBtn" onclick="startDeployment()" 
          class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-all flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <i data-lucide="rocket" class="w-5 h-5"></i>
          <span id="btnText">開始部署至 GitHub Pages</span>
        </button>

      </div>

      <!-- 右側：程式碼與日誌 -->
      <div class="lg:col-span-8 space-y-6">
        
        <!-- Step 4: 全端程式碼編輯器 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[500px] overflow-hidden">
          
          <!-- 頁籤列 -->
          <div class="bg-slate-50 border-b border-slate-200 px-2 pt-2 flex items-end gap-1" id="fileTabsContainer">
            <button onclick="switchTab('index.html')" id="tab-index.html" class="px-4 py-2 text-sm font-mono font-medium rounded-t-lg bg-white border-t border-l border-r border-slate-200 text-blue-600 transition-colors">
              <i data-lucide="file-code-2" class="w-4 h-4 inline-block mr-1 align-text-bottom"></i>index.html
            </button>
            <!-- 以下為 Vercel 模式才會顯示的頁籤 -->
            <button onclick="switchTab('api/index.js')" id="tab-api/index.js" class="hidden px-4 py-2 text-sm font-mono font-medium rounded-t-lg text-slate-500 hover:bg-slate-200 transition-colors">
              <i data-lucide="server" class="w-4 h-4 inline-block mr-1 align-text-bottom"></i>api/index.js
            </button>
            <button onclick="switchTab('package.json')" id="tab-package.json" class="hidden px-4 py-2 text-sm font-mono font-medium rounded-t-lg text-slate-500 hover:bg-slate-200 transition-colors">
              <i data-lucide="package" class="w-4 h-4 inline-block mr-1 align-text-bottom"></i>package.json
            </button>
          </div>

          <!-- 編輯區 -->
          <textarea id="codeEditor" oninput="saveCurrentFile()" spellcheck="false"
            class="flex-grow w-full p-4 font-mono text-sm focus:outline-none resize-none bg-white text-slate-800 leading-relaxed"></textarea>
        </div>

        <!-- 執行日誌 (Terminal-like) -->
        <div class="bg-slate-900 rounded-2xl shadow-sm overflow-hidden border border-slate-800">
          <div class="bg-slate-800 px-4 py-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i data-lucide="terminal" class="w-4 h-4 text-slate-400"></i>
              <span class="text-xs font-mono text-slate-400">系統終端機日誌</span>
            </div>
          </div>
          <div id="logArea" class="p-4 h-[200px] overflow-y-auto font-mono text-xs text-slate-300 log-container space-y-1">
            <div class="text-slate-500">系統就緒，等待操作...</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // 初始化 Lucide Icons
    lucide.createIcons();

    // 檔案狀態管理 (微型系統核心)
    let currentFileName = 'index.html';
    const files = {
      'index.html': `<!DOCTYPE html>\n<html lang="zh-TW">\n<head>\n  <meta charset="UTF-8">\n  <title>我的全端應用</title>\n  <style>\n    body { font-family: sans-serif; text-align: center; padding-top: 50px; }\n    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }\n  </style>\n</head>\n<body>\n  <h1>哈囉！這是首頁</h1>\n  <p>點擊下方按鈕測試後端 API 連線 (限 Vercel 模式有效)</p>\n  <button onclick="fetchApi()">呼叫後端 API</button>\n  <p id="result" style="margin-top:20px; color: blue; font-weight: bold;"></p>\n\n  <script>\n    async function fetchApi() {\n      document.getElementById('result').innerText = '載入中...';\n      try {\n        const res = await fetch('/api');\n        const data = await res.json();\n        document.getElementById('result').innerText = '後端回應: ' + data.message;\n      } catch (err) {\n        document.getElementById('result').innerText = 'API 呼叫失敗，請確認是否使用 Vercel 模式部署。';\n      }\n    }\n  <\/script>\n</body>\n</html>`,
      'api/index.js': `// Vercel Serverless Function (後端入口)\nexport default function handler(req, res) {\n  res.status(200).json({\n    message: "來自 Vercel 伺服器的問候！現在時間: " + new Date().toLocaleTimeString(),\n    status: "success"\n  });\n}`,
      'package.json': `{\n  "name": "my-vercel-app",\n  "version": "1.0.0",\n  "description": "Deployed via AutoDeploy Tool",\n  "dependencies": {}\n}`
    };

    // 初始化編輯器
    document.getElementById('codeEditor').value = files[currentFileName];

    // 切換模式：靜態 (GitHub) vs 動態 (Vercel)
    function toggleMode() {
      const mode = document.getElementById('deployMode').value;
      const vercelTokenGroup = document.getElementById('vercelTokenGroup');
      const apiTab = document.getElementById('tab-api/index.js');
      const pkgTab = document.getElementById('tab-package.json');
      const btnText = document.getElementById('btnText');

      if (mode === 'vercel') {
        vercelTokenGroup.classList.remove('hidden');
        apiTab.classList.remove('hidden');
        pkgTab.classList.remove('hidden');
        btnText.innerText = '一鍵部署至 Vercel (動態)';
      } else {
        vercelTokenGroup.classList.add('hidden');
        apiTab.classList.add('hidden');
        pkgTab.classList.add('hidden');
        btnText.innerText = '開始部署至 GitHub Pages (靜態)';
        // 若切回靜態，強制回到 index.html
        if (currentFileName !== 'index.html') switchTab('index.html');
      }
    }

    // 切換檔案頁籤
    function switchTab(fileName) {
      saveCurrentFile(); // 先儲存目前的編輯狀態
      currentFileName = fileName;
      document.getElementById('codeEditor').value = files[fileName];
      
      // 更新 UI 樣式
      ['index.html', 'api/index.js', 'package.json'].forEach(f => {
        const tab = document.getElementById(`tab-${f}`);
        if (!tab) return;
        if (f === fileName) {
          tab.className = 'px-4 py-2 text-sm font-mono font-medium rounded-t-lg bg-white border-t border-l border-r border-slate-200 text-blue-600 transition-colors';
        } else {
          tab.className = 'hidden md:block px-4 py-2 text-sm font-mono font-medium rounded-t-lg text-slate-500 hover:bg-slate-200 transition-colors cursor-pointer border-t border-transparent border-l border-r';
          if (document.getElementById('deployMode').value === 'vercel' || f === 'index.html') {
            tab.classList.remove('hidden');
          }
        }
      });
    }

    // 儲存編輯器內容到記憶體
    function saveCurrentFile() {
      files[currentFileName] = document.getElementById('codeEditor').value;
    }

    // 日誌記錄功能
    function log(message, type = 'info') {
      const logArea = document.getElementById('logArea');
      if (logArea.innerHTML.includes('等待操作...')) logArea.innerHTML = '';
      
      const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
      let colorClass = 'text-slate-300';
      if (type === 'success') colorClass = 'text-emerald-400 font-bold';
      if (type === 'error') colorClass = 'text-rose-400 font-bold';
      if (type === 'warn') colorClass = 'text-amber-400';

      const logNode = document.createElement('div');
      logNode.innerHTML = `<span class="text-slate-500">[${time}]</span> <span class="${colorClass}">${message}</span>`;
      logArea.appendChild(logNode);
      logArea.scrollTop = logArea.scrollHeight;
    }

    // 將字串轉為 UTF-8 Base64
    function utf8_to_b64(str) {
      return window.btoa(unescape(encodeURIComponent(str)));
    }

    // 上傳單一檔案到 GitHub 的通用函數
    async function uploadFileToGitHub(username, repoName, fileName, content, token, defaultBranch) {
      log(`正在備份 ${fileName} 至 GitHub...`, 'info');
      let fileSha = undefined;
      // 取得現有檔案 SHA (若是更新)
      const checkRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${fileName}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (checkRes.ok) {
        const data = await checkRes.json();
        fileSha = data.sha;
      }
      
      // 執行上傳
      const uploadRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${fileName}`, {
        method: 'PUT',
        headers: { 
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: `Update ${fileName} via AutoDeploy Tool`,
          content: utf8_to_b64(content),
          sha: fileSha,
          branch: defaultBranch
        })
      });

      if (!uploadRes.ok) {
        const err = await uploadRes.json();
        throw new Error(`上傳 ${fileName} 失敗：${err.message}`);
      }
    }

    // 主要部署邏輯
    async function startDeployment() {
      saveCurrentFile(); // 確保最新變更已儲存
      const mode = document.getElementById('deployMode').value;
      const ghToken = document.getElementById('ghToken').value.trim();
      const vercelToken = document.getElementById('vercelToken').value.trim();
      const repoName = document.getElementById('repoName').value.trim();
      const btn = document.getElementById('deployBtn');

      if (!ghToken || !repoName) {
        alert('請填寫 GitHub Token 與 專案名稱！');
        return;
      }
      if (mode === 'vercel' && !vercelToken) {
        alert('Vercel 模式需要提供 Vercel Access Token！');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>執行部署中...</span>`;
      lucide.createIcons();
      document.getElementById('logArea').innerHTML = '';

      try {
        log(`啟動部署任務 (模式: ${mode.toUpperCase()})`, 'info');

        // === 階段 1: GitHub 基礎建設 ===
        log('正在驗證 GitHub Token...', 'info');
        const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${ghToken}` } });
        if (!userRes.ok) throw new Error('GitHub Token 驗證失敗。');
        const userData = await userRes.json();
        const username = userData.login;
        log(`認證成功！GitHub 使用者：${username}`, 'success');

        log(`檢查儲存庫 [${repoName}]...`, 'info');
        let defaultBranch = 'main';
        const repoCheckRes = await fetch(`https://api.github.com/repos/${username}/${repoName}`, { headers: { 'Authorization': `token ${ghToken}` } });

        if (repoCheckRes.status === 404) {
          log('建立全新 GitHub 儲存庫...', 'warn');
          const createRes = await fetch('https://api.github.com/user/repos', {
            method: 'POST',
            headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: repoName, auto_init: true })
          });
          if (!createRes.ok) throw new Error('建立儲存庫失敗。');
          const createData = await createRes.json();
          defaultBranch = createData.default_branch || 'main';
          await new Promise(r => setTimeout(r, 2000)); // 等待系統初始化
        } else if (repoCheckRes.ok) {
          const repoData = await repoCheckRes.json();
          defaultBranch = repoData.default_branch || 'main';
        }

        // === 階段 2: 程式碼上傳 ===
        const filesToUpload = mode === 'vercel' ? Object.keys(files) : ['index.html'];
        for (const fName of filesToUpload) {
          await uploadFileToGitHub(username, repoName, fName, files[fName], ghToken, defaultBranch);
        }
        log('所有原始碼已成功備份至 GitHub！', 'success');

        // === 階段 3: 雲端服務開通 ===
        log('-----------------------------------', 'info');
        
        if (mode === 'gh-pages') {
          // --- GitHub Pages 分支流程 ---
          log('正在開通 GitHub Pages 靜態託管服務...', 'info');
          const pagesRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/pages`, {
            method: 'POST',
            headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: { branch: defaultBranch, path: '/' } })
          });
          
          if (!pagesRes.ok && pagesRes.status !== 409) log('設定 GitHub Pages 時遇警告，服務可能已啟動。', 'warn');
          
          const pagesUrl = `https://${username}.github.io/${repoName}/`;
          log('🎉 靜態部署流程完成！', 'success');
          log(`🌐 網站網址：<a href="${pagesUrl}" target="_blank" class="text-blue-400 underline">${pagesUrl}</a>`, 'success');
          log('⚠️ 注意：首次產生靜態網頁可能需要 1~3 分鐘。', 'warn');

        } else {
          // --- Vercel API 分支流程 ---
          log('正在透過 Vercel Direct API 部署動態應用...', 'info');
          
          // 組合 Vercel 所需的檔案結構
          const vercelFiles = Object.keys(files).map(fName => ({
            file: fName,
            data: files[fName]
          }));

          const vercelRes = await fetch('https://api.vercel.com/v13/deployments', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${vercelToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: repoName,
              target: 'production',
              projectSettings: { framework: null }, // 自動偵測最佳配置
              files: vercelFiles
            })
          });

          if (!vercelRes.ok) {
            const err = await vercelRes.json();
            throw new Error(`Vercel 部署失敗：${err.error?.message || '未知錯誤'}`);
          }

          const vercelData = await vercelRes.json();
          const deploymentUrl = `https://${vercelData.url}`;
          
          log('🎉 Vercel 動態編譯與部署成功！', 'success');
          log(`🌐 全端應用網址：<a href="${deploymentUrl}" target="_blank" class="text-blue-400 underline">${deploymentUrl}</a>`, 'success');
          log('✅ 後端 Serverless API 已自動啟用於 /api 路徑。', 'info');
        }

      } catch (error) {
        log(`部署失敗中斷：${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i data-lucide="rocket" class="w-5 h-5"></i><span>${mode === 'vercel' ? '一鍵部署至 Vercel (動態)' : '開始部署至 GitHub Pages (靜態)'}</span>`;
        lucide.createIcons();
      }
    }
  </script>
</body>
</html>
